name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - spike/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test
